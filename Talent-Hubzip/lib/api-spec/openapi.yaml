openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Jobera.az Job Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: candidates
    description: Candidate profiles
  - name: companies
    description: Company / HR profiles
  - name: jobs
    description: Job vacancies
  - name: applications
    description: Job applications
  - name: contact-requests
    description: HR contact requests (blur mechanism)
  - name: subscriptions
    description: Candidate subscription packages
  - name: ratings
    description: HR ratings of candidates
  - name: dashboard
    description: Dashboard summary endpoints
  - name: platform
    description: Public platform statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── CANDIDATES ─────────────────────────────────────────────────────────────
  /candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List candidate profiles
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: metro
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: hasDisability
          in: query
          schema:
            type: boolean
        - name: hasFinancialIssues
          in: query
          schema:
            type: boolean
        - name: salaryMin
          in: query
          schema:
            type: integer
        - name: salaryMax
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateListResponse"

    post:
      operationId: createCandidate
      tags: [candidates]
      summary: Create or update own candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  /candidates/top:
    get:
      operationId: getTopCandidates
      tags: [candidates]
      summary: Get top VIP / subscription candidates per category
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Top candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candidate"

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a candidate profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateCandidate
      tags: [candidates]
      summary: Update own candidate profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  # ─── COMPANIES ──────────────────────────────────────────────────────────────
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List company profiles
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"

    post:
      operationId: createCompany
      tags: [companies]
      summary: Create company / HR profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get a company profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # ─── JOBS ───────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List job vacancies
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: employmentType
          in: query
          schema:
            type: string
        - name: salaryMin
          in: query
          schema:
            type: integer
        - name: salaryMax
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: companyId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

    post:
      operationId: createJob
      tags: [jobs]
      summary: Post a new job vacancy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/stats:
    get:
      operationId: getJobStats
      tags: [jobs]
      summary: Get aggregate job stats (by category, by city)
      responses:
        "200":
          description: Job statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStats"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job vacancy details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job vacancy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job vacancy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── APPLICATIONS ───────────────────────────────────────────────────────────
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List applications (for HR or candidate)
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: candidateId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

    post:
      operationId: createApplication
      tags: [applications]
      summary: Apply to a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      summary: Get application details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

    patch:
      operationId: updateApplication
      tags: [applications]
      summary: Update application status (HR only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  # ─── CONTACT REQUESTS (BLUR MECHANIC) ───────────────────────────────────────
  /contact-requests:
    get:
      operationId: listContactRequests
      tags: [contact-requests]
      summary: List contact requests (HR sees sent, candidate sees received)
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Contact requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactRequest"

    post:
      operationId: createContactRequest
      tags: [contact-requests]
      summary: HR initiates contact with a (blurred) candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequestInput"
      responses:
        "201":
          description: Contact request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactRequest"

  /contact-requests/{id}:
    patch:
      operationId: updateContactRequest
      tags: [contact-requests]
      summary: Candidate responds (accept/decline) or updates status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequestUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactRequest"

  # ─── SUBSCRIPTIONS ──────────────────────────────────────────────────────────
  /packages:
    get:
      operationId: listPackages
      tags: [subscriptions]
      summary: List available subscription packages
      responses:
        "200":
          description: Packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"

  /subscriptions:
    get:
      operationId: listSubscriptions
      tags: [subscriptions]
      summary: Get current user's active subscriptions
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"

    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Purchase a subscription package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /payments/create:
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a pending payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packageId]
              properties:
                packageId:
                  type: integer
                contactRequestId:
                  type: integer
      responses:
        "201":
          description: Payment created

  /payments/confirm:
    post:
      operationId: confirmPayment
      tags: [payments]
      summary: Confirm a simulated payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentId]
              properties:
                paymentId:
                  type: integer
      responses:
        "200":
          description: Payment confirmed

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List user payments
      responses:
        "200":
          description: Payments

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List in-app notifications
      responses:
        "200":
          description: Notifications

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification

  /candidates/me:
    get:
      operationId: getMyCandidate
      tags: [candidates]
      summary: Get own candidate profile
      responses:
        "200":
          description: Candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Candidate"

  # ─── RATINGS ────────────────────────────────────────────────────────────────
  /ratings:
    get:
      operationId: listRatings
      tags: [ratings]
      summary: List ratings for a candidate
      parameters:
        - name: candidateId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"

    post:
      operationId: createRating
      tags: [ratings]
      summary: HR submits rating and review for a candidate after interview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"

  # ─── DASHBOARD ──────────────────────────────────────────────────────────────
  /platform/stats:
    get:
      operationId: getPlatformStats
      tags: [platform]
      summary: Public platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /dashboard/hr-summary:
    get:
      operationId: getHrDashboardSummary
      tags: [dashboard]
      summary: HR dashboard overview (total jobs, applications, contact requests)
      responses:
        "200":
          description: HR summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrDashboardSummary"

  /dashboard/candidate-summary:
    get:
      operationId: getCandidateDashboardSummary
      tags: [dashboard]
      summary: Candidate dashboard overview (profile views, applications, contact requests)
      responses:
        "200":
          description: Candidate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed for the current user
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    # ── AUTH ──────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, fullName, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        role:
          type: string
          enum: [candidate, hr]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, fullName, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [candidate, hr, admin]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ── CANDIDATE ─────────────────────────────────────────────────────────────
    Candidate:
      type: object
      required: [id, userId, fullName, category, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        fullName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        category:
          type: string
        title:
          type: ["string", "null"]
        summary:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        district:
          type: ["string", "null"]
        metroStation:
          type: ["string", "null"]
        salaryExpectation:
          type: ["integer", "null"]
        currency:
          type: string
          default: AZN
        experienceYears:
          type: ["integer", "null"]
        education:
          type: ["string", "null"]
        languages:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        cvUrl:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        canViewContact:
          type: boolean
        voiceIntroUrl:
          type: ["string", "null"]
        videoIntroUrl:
          type: ["string", "null"]
        hasDisabilityStatus:
          type: boolean
          default: false
        hasMedicalRestriction:
          type: boolean
          default: false
        hasFinancialIssues:
          type: boolean
          default: false
        isContactBlurred:
          type: boolean
          default: true
        subscriptionTier:
          type: string
          enum: [free, vip, time_limited]
          default: free
        subscriptionExpiresAt:
          type: ["string", "null"]
          format: date-time
        averageRating:
          type: ["number", "null"]
        totalRatings:
          type: integer
          default: 0
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time

    CandidateInput:
      type: object
      required: [category, fullName]
      properties:
        fullName:
          type: string
        category:
          type: string
        title:
          type: string
        summary:
          type: string
        city:
          type: string
        district:
          type: string
        metroStation:
          type: string
        salaryExpectation:
          type: integer
        currency:
          type: string
        experienceYears:
          type: integer
        education:
          type: string
        languages:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        cvUrl:
          type: string
        voiceIntroUrl:
          type: string
        videoIntroUrl:
          type: string
        hasDisabilityStatus:
          type: boolean
        hasMedicalRestriction:
          type: boolean
        hasFinancialIssues:
          type: boolean

    CandidateUpdate:
      type: object
      properties:
        fullName:
          type: string
        category:
          type: string
        title:
          type: string
        summary:
          type: string
        city:
          type: string
        district:
          type: string
        metroStation:
          type: string
        salaryExpectation:
          type: integer
        currency:
          type: string
        experienceYears:
          type: integer
        education:
          type: string
        languages:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        cvUrl:
          type: string
        voiceIntroUrl:
          type: string
        videoIntroUrl:
          type: string
        hasDisabilityStatus:
          type: boolean
        hasMedicalRestriction:
          type: boolean
        hasFinancialIssues:
          type: boolean
        isActive:
          type: boolean

    CandidateListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Candidate"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ── COMPANY ───────────────────────────────────────────────────────────────
    Company:
      type: object
      required: [id, userId, name, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        logoUrl:
          type: ["string", "null"]
        sector:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        employeeCount:
          type: ["string", "null"]
        isVerified:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        logoUrl:
          type: string
        sector:
          type: string
        description:
          type: string
        city:
          type: string
        address:
          type: string
        website:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        employeeCount:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
        sector:
          type: string
        description:
          type: string
        city:
          type: string
        address:
          type: string
        website:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        employeeCount:
          type: string

    # ── JOB ───────────────────────────────────────────────────────────────────
    Job:
      type: object
      required: [id, companyId, title, category, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        company:
          $ref: "#/components/schemas/Company"
        title:
          type: string
        category:
          type: string
        description:
          type: ["string", "null"]
        requirements:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        employmentType:
          type: string
          enum: [full_time, part_time, remote, hybrid, internship]
          default: full_time
        salaryMin:
          type: ["integer", "null"]
        salaryMax:
          type: ["integer", "null"]
        currency:
          type: string
          default: AZN
        isActive:
          type: boolean
          default: true
        viewCount:
          type: integer
          default: 0
        applicationCount:
          type: integer
          default: 0
        createdAt:
          type: string
          format: date-time

    JobInput:
      type: object
      required: [title, category]
      properties:
        title:
          type: string
        category:
          type: string
        description:
          type: string
        requirements:
          type: string
        city:
          type: string
        address:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, remote, hybrid, internship]
        salaryMin:
          type: integer
        salaryMax:
          type: integer
        currency:
          type: string

    JobUpdate:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        description:
          type: string
        requirements:
          type: string
        city:
          type: string
        address:
          type: string
        employmentType:
          type: string
          enum: [full_time, part_time, remote, hybrid, internship]
        salaryMin:
          type: integer
        salaryMax:
          type: integer
        currency:
          type: string
        isActive:
          type: boolean

    JobListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    JobStats:
      type: object
      required: [totalJobs, byCategory, byCity, byEmploymentType]
      properties:
        totalJobs:
          type: integer
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/StatGroup"
        byCity:
          type: array
          items:
            $ref: "#/components/schemas/StatGroup"
        byEmploymentType:
          type: array
          items:
            $ref: "#/components/schemas/StatGroup"

    StatGroup:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    # ── APPLICATION ───────────────────────────────────────────────────────────
    Application:
      type: object
      required: [id, jobId, candidateId, status, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        job:
          $ref: "#/components/schemas/Job"
        candidateId:
          type: integer
        candidate:
          $ref: "#/components/schemas/Candidate"
        status:
          type: string
          enum: [pending, reviewed, shortlisted, rejected, hired]
          default: pending
        coverLetter:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ApplicationInput:
      type: object
      required: [jobId]
      properties:
        jobId:
          type: integer
        coverLetter:
          type: string

    ApplicationUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, reviewed, shortlisted, rejected, hired]

    # ── CONTACT REQUEST ───────────────────────────────────────────────────────
    ContactRequest:
      type: object
      required: [id, hrUserId, candidateId, status, createdAt]
      properties:
        id:
          type: integer
        hrUserId:
          type: integer
        candidateId:
          type: integer
        candidate:
          $ref: "#/components/schemas/Candidate"
        company:
          $ref: "#/components/schemas/Company"
        status:
          type: string
          enum: [pending, accepted, accepted_pending_payment, declined, expired]
          default: pending
        message:
          type: ["string", "null"]
        unblurredAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ContactRequestInput:
      type: object
      required: [candidateId]
      properties:
        candidateId:
          type: integer
        message:
          type: string

    ContactRequestUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [accepted, declined, cancelled]

    # ── SUBSCRIPTION ──────────────────────────────────────────────────────────
    Package:
      type: object
      required: [id, name, tier, price, currency, durationDays]
      properties:
        id:
          type: integer
        name:
          type: string
        tier:
          type: string
          enum: [vip, time_1day, time_15day, time_30day]
        description:
          type: ["string", "null"]
        price:
          type: number
        currency:
          type: string
          default: AZN
        durationDays:
          type: integer
        features:
          type: array
          items:
            type: string

    Subscription:
      type: object
      required: [id, userId, packageId, status, startsAt, expiresAt, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        packageId:
          type: integer
        package:
          $ref: "#/components/schemas/Package"
        status:
          type: string
          enum: [active, expired, cancelled]
        startsAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SubscriptionInput:
      type: object
      required: [packageId]
      properties:
        packageId:
          type: integer

    # ── RATING ────────────────────────────────────────────────────────────────
    Rating:
      type: object
      required: [id, hrUserId, candidateId, stars, createdAt]
      properties:
        id:
          type: integer
        hrUserId:
          type: integer
        candidateId:
          type: integer
        company:
          $ref: "#/components/schemas/Company"
        stars:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    RatingInput:
      type: object
      required: [candidateId, stars]
      properties:
        candidateId:
          type: integer
        stars:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    # ── DASHBOARD ─────────────────────────────────────────────────────────────
    PlatformStats:
      type: object
      required: [activeJobs, totalCandidates, totalCompanies]
      properties:
        activeJobs:
          type: integer
        totalCandidates:
          type: integer
        totalCompanies:
          type: integer

    HrDashboardSummary:
      type: object
      required: [totalJobs, activeJobs, totalApplications, pendingApplications, totalContactRequests, acceptedContactRequests]
      properties:
        totalJobs:
          type: integer
        activeJobs:
          type: integer
        totalApplications:
          type: integer
        pendingApplications:
          type: integer
        totalContactRequests:
          type: integer
        acceptedContactRequests:
          type: integer
        recentJobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        recentApplications:
          type: array
          items:
            $ref: "#/components/schemas/Application"

    CandidateDashboardSummary:
      type: object
      required: [totalApplications, pendingApplications, totalContactRequests, profileViews, subscriptionStatus]
      properties:
        totalApplications:
          type: integer
        pendingApplications:
          type: integer
        totalContactRequests:
          type: integer
        profileViews:
          type: integer
        subscriptionStatus:
          type: string
        subscriptionExpiresAt:
          type: ["string", "null"]
          format: date-time
        recentContactRequests:
          type: array
          items:
            $ref: "#/components/schemas/ContactRequest"
        recentApplications:
          type: array
          items:
            $ref: "#/components/schemas/Application"

    ActivityItem:
      type: object
      required: [id, type, title, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [application, contact_request, rating, job_posted, subscription]
        title:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
