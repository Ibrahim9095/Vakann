kind = "web"
previewPath = "/"
title = "Jobera.az"
version = "1.0.0"
id = "artifacts/jobera"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19796

[services.development]
run = "pnpm --filter @workspace/jobera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jobera", "run", "build" ]
serve = "static"
publicDir = "artifacts/jobera/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19796"
BASE_PATH = "/"
